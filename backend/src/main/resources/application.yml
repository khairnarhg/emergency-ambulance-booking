spring:
  application:
    name: rakshapoorvak-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8080}

# JWT config (override via env in prod)
jwt:
  secret: ${JWT_SECRET:rakshapoorvak-dev-secret-key-min-256-bits-for-development-only}
  access-expiration: ${JWT_ACCESS_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
