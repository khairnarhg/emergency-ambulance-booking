# RakshaPoorvak PostgreSQL - runs in Rancher Desktop (Docker)
# Start: docker compose -f docker-compose.raksha-db.yml up -d
# Stop:  docker compose -f docker-compose.raksha-db.yml down

services:
  raksha-postgres:
    image: postgres:15
    container_name: raksha-postgres
    ports:
      - "25432:5432"
    environment:
      POSTGRES_DB: rakshapoorvak_dev
      POSTGRES_USER: rakshapoorvak
      POSTGRES_PASSWORD: dev_password
    volumes:
      - raksha_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rakshapoorvak -d rakshapoorvak_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  raksha_pgdata:
    name: raksha_pgdata
